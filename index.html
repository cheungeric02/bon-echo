  .check:checked { background: var(--accent); border-color: var(--accent); }

  }
  @media (max-width: 520px) {
    .cols-4, .cols-3, .cols-2 { grid-template-columns: 1fr; }
    .field.row2 { grid-template-columns: 1fr; }
  }
</style>

  /* ---------- Date helpers ---------- */
  const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const DAYS = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  function parseDate(s) { if (!s) return null; const [y,m,d] = s.split("-").map(Number); return new Date(y, m-1, d, 12, 0, 0); }
  function fmtDate(s, opt) {
    const d = parseDate(s); if (!d) return "";
    if (opt === "long") return DAYS[d.getDay()] + ", " + MONTHS[d.getMonth()] + " " + d.getDate();
    if (opt === "dow") return DAYS[d.getDay()];
    if (opt === "md") return MONTHS[d.getMonth()] + " " + d.getDate();
    return MONTHS[d.getMonth()] + " " + d.getDate() + ", " + d.getFullYear();
  }
  function fmtRange(a, b) {
    const da = parseDate(a), db = parseDate(b); if (!da) return "";
    if (!db || a === b) return fmtDate(a);
    const sameYear = da.getFullYear() === db.getFullYear();
    const sameMonth = sameYear && da.getMonth() === db.getMonth();
    if (sameMonth) return MONTHS[da.getMonth()] + " " + da.getDate() + "–" + db.getDate() + ", " + db.getFullYear();
    if (sameYear) return MONTHS[da.getMonth()] + " " + da.getDate() + " – " + MONTHS[db.getMonth()] + " " + db.getDate() + ", " + db.getFullYear();
    return fmtDate(a) + " – " + fmtDate(b);
  }
  function tripDays(trip) {
    const out = []; const s = parseDate(trip.startDate), e = parseDate(trip.endDate);
    if (!s) return out; const end = e || s;
    let cur = new Date(s); let guard = 0;
    while (cur <= end && guard < 60) { const iso = cur.getFullYear()+"-"+String(cur.getMonth()+1).padStart(2,"0")+"-"+String(cur.getDate()).padStart(2,"0"); out.push(iso); cur.setDate(cur.getDate()+1); guard++; }
    return out;
  }
  function daysUntil(s) {
    const d = parseDate(s); if (!d) return null;
    const now = new Date(); now.setHours(12,0,0,0);
    return Math.round((d - now) / 86400000);
  }
  function todayISO() { const n = new Date(); return n.getFullYear()+"-"+String(n.getMonth()+1).padStart(2,"0")+"-"+String(n.getDate()).padStart(2,"0"); }
  function initials(name) { return (name||"?").trim().split(/\s+/).map(w=>w[0]).slice(0,2).join("").toUpperCase(); }
  function esc(s) { return String(s==null?"":s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
  function money(n) { const v = Number(n)||0; return "$" + v.toLocaleString(undefined,{minimumFractionDigits:2, maximumFractionDigits:2}); }

  function init() {

    if (!state || !state.trips || !state.trips.length) {
      const t = seedBonEcho();
      state = { trips: [t], activeId: t.id, theme: "auto" };
      save();
    }
    // migrate: ensure fields exist
    state.trips.forEach(t => {
      ["weather","meals","shopping","roles","schedule","packing","guests","budget","checklist","people"].forEach(k => { if (!Array.isArray(t[k])) t[k] = []; });
      if (typeof t.notes !== "string") t.notes = "";

    applyTheme();
    render();
  }

  /* ---------- Theme ---------- */
  function applyTheme() {
    const t = state.theme || "auto";
    if (t === "auto") document.documentElement.removeAttribute("data-theme");
    else document.documentElement.setAttribute("data-theme", t);
  }
  function cycleTheme() {
    const order = ["auto","light","dark"]; const cur = state.theme || "auto";
    state.theme = order[(order.indexOf(cur)+1) % 3]; save(); applyTheme();
    toast("Theme: " + state.theme);
  }

  /* ---------- Toast ---------- */
  function toast(msg) {
    const wrap = document.getElementById("toasts");
    const el = document.createElement("div"); el.className = "toast"; el.textContent = msg;
    wrap.appendChild(el);
    setTimeout(() => { el.style.opacity = "0"; el.style.transition = "opacity .3s"; setTimeout(() => el.remove(), 300); }, 2200);
  }

  /* =========================================================

  ========================================================= */
  let modalState = null;
  function openForm(opts) {
    // opts: { title, fields:[{key,label,type,options,required,placeholder,hint,value,row}], values, onSubmit }
    modalState = opts;
    const overlay = document.getElementById("overlay");
    const trip = activeTrip();
    const fieldsHtml = opts.fields.map(f => renderField(f, (opts.values||{})[f.key], trip)).join("");
    overlay.innerHTML =
      '<div class="modal" role="dialog" aria-modal="true">' +
        '<div class="modal-head"><h3>'+esc(opts.title)+'</h3>' +
          '<button class="icon-btn" data-close>'+I.x+'</button></div>' +
        '<form id="modalForm"><div class="modal-body">'+fieldsHtml+'</div>' +
        '<div class="modal-foot">' +
          '<button type="button" class="btn ghost" data-close>Cancel</button>' +
          '<button type="submit" class="btn primary">'+esc(opts.submitLabel||"Save")+'</button>' +
        '</div></form>' +
      '</div>';
    overlay.classList.add("open");
    const form = document.getElementById("modalForm");
    // multiselect chips + toggle chips wiring
    overlay.querySelectorAll("[data-chip]").forEach(ch => {
      ch.addEventListener("click", () => ch.classList.toggle("on"));
    });
    form.addEventListener("submit", e => {
      e.preventDefault();
      const out = {};
      let bad = null;
      opts.fields.forEach(f => {
        if (f.type === "multiperson") {
          out[f.key] = Array.from(overlay.querySelectorAll('[data-chip][data-field="'+f.key+'"].on')).map(c => c.dataset.val);
        } else if (f.type === "checkbox") {
          out[f.key] = overlay.querySelector('[name="'+f.key+'"]').checked;
        } else {
          const el = overlay.querySelector('[name="'+f.key+'"]');
          let v = el ? el.value.trim() : "";
          if (f.required && !v) { if (!bad) bad = el; }
          out[f.key] = v;
        }
      });
      if (bad) { bad.focus(); bad.style.borderColor = "var(--danger)"; toast("Please fill in the required fields"); return; }
      closeModal();
      opts.onSubmit(out);
    });
    const first = overlay.querySelector("input, select, textarea"); if (first) setTimeout(() => first.focus(), 50);
  }
  function renderField(f, val, trip) {
    val = val == null ? (f.default != null ? f.default : "") : val;
    let inner = "";
    const name = 'name="'+f.key+'"';
    if (f.type === "textarea") inner = '<textarea '+name+' placeholder="'+esc(f.placeholder||"")+'">'+esc(val)+'</textarea>';
    else if (f.type === "select") {
      const opts = (typeof f.options === "function" ? f.options(trip) : f.options) || [];
      inner = '<select '+name+'>' + opts.map(o => {
        const ov = typeof o === "object" ? o.value : o; const ol = typeof o === "object" ? o.label : o;
        return '<option value="'+esc(ov)+'"'+(String(ov)===String(val)?" selected":"")+'>'+esc(ol)+'</option>';
      }).join("") + '</select>';
    }
    else if (f.type === "person") {
      const people = trip.people || [];
      inner = '<select '+name+'><option value="">— Unassigned —</option>' + people.map(p =>
        '<option value="'+p.id+'"'+(p.id===val?" selected":"")+'>'+esc(p.name)+'</option>').join("") + '</select>';
    }
    else if (f.type === "multiperson") {
      const people = trip.people || []; const arr = Array.isArray(val) ? val : (people.map(p=>p.id));
      inner = '<div class="chips">' + people.map(p =>
        '<button type="button" class="chip-toggle'+(arr.indexOf(p.id)>=0?" on":"")+'" data-chip data-field="'+f.key+'" data-val="'+p.id+'">'+esc(p.name)+'</button>').join("") + '</div>';
    }
    else if (f.type === "checkbox") {
      inner = '<label style="display:flex;align-items:center;gap:9px;font-weight:400;cursor:pointer">' +
        '<input type="checkbox" '+name+' class="check"'+(val?" checked":"")+'> '+esc(f.checkLabel||"")+'</label>';
      return '<div class="field">'+inner+(f.hint?'<span class="hint">'+esc(f.hint)+'</span>':"")+'</div>';
    }
    else inner = '<input type="'+(f.type||"text")+'" '+name+' value="'+esc(val)+'" placeholder="'+esc(f.placeholder||"")+'"'+(f.type==="number"?' step="0.01"':"")+'>';
    return '<div class="field'+(f.row?" ":"")+'"><label>'+esc(f.label)+(f.required?' <span style="color:var(--danger)">*</span>':"")+'</label>'+inner+(f.hint?'<span class="hint">'+esc(f.hint)+'</span>':"")+'</div>';
  }
  function closeModal() {
    const overlay = document.getElementById("overlay");
    overlay.classList.remove("open");
    setTimeout(() => { if (!overlay.classList.contains("open")) overlay.innerHTML = ""; }, 200);
    modalState = null;
  }
  function confirmDialog(title, msg, onYes, yesLabel) {

    overlay.classList.add("open");
    document.getElementById("confirmYes").addEventListener("click", () => { closeModal(); onYes(); });
  }

  function emptyState(icon, msg, action, label) {
    return '<div class="card card-pad empty">'+icon+'<p>'+esc(msg)+'</p>' +
      (action?'<button class="btn primary" data-action="'+action+'" style="margin:0 auto">'+I.plus+' '+esc(label)+'</button>':"") + '</div>';
  }
  function rowActions(editAction, delAction, id) {
    return '<div class="row-actions">' +
      '<button class="icon-btn" data-action="'+editAction+'" data-id="'+id+'" title="Edit">'+I.edit+'</button>' +
      '<button class="icon-btn" data-action="'+delAction+'" data-id="'+id+'" title="Delete">'+I.trash+'</button></div>';
  }
  function personBadge(trip, id) {
    if (!id) return '<span class="pill muted">Unassigned</span>';
    const n = personName(trip, id); if (!n) return '<span class="pill muted">Unassigned</span>';
    return '<span class="avatar" title="'+esc(n)+'">'+initials(n)+'</span>';
  }

  function renderSection() {
    const trip = activeTrip();
    const el = document.getElementById("content");
    const map = { overview: secOverview, weather: secWeather, meals: secMeals, shopping: secShopping,
      roles: secRoles, schedule: secSchedule, packing: secPacking, guests: secGuests, budget: secBudget, notes: secNotes };
    el.innerHTML = (map[ui.section] || secOverview)(trip);
    if (ui.section === "notes") wireNotes(trip);
  }

  /* =========================================================
     SECTIONS
  ========================================================= */
  function secOverview(trip) {
    const days = tripDays(trip);
    const du = daysUntil(trip.startDate);
    const dueEnd = daysUntil(trip.endDate);
    let countTitle, countVal, countSub, pillClass = "ember";
    if (du === null) { countVal = "—"; countTitle = "Countdown"; countSub = "Set trip dates to start the countdown"; pillClass="muted"; }
    else if (du > 0) { countVal = du; countTitle = "Days to go"; countSub = "Departure " + fmtDate(trip.startDate,"long"); }
    else if (du <= 0 && dueEnd >= 0) { countVal = "Now"; countTitle = "Trip in progress"; countSub = "Wraps " + fmtDate(trip.endDate,"long"); pillClass="green"; }
    else { countVal = "✓"; countTitle = "Trip complete"; countSub = "Hope it was a good one"; pillClass="muted"; }

    const packedTotal = trip.packing.length;
    const packedDone = trip.packing.filter(x=>x.packed).length;
    const packPct = packedTotal ? Math.round(packedDone/packedTotal*100) : 0;
    const mealsPlanned = trip.meals.filter(m=>m.name).length;
    const guestsYes = trip.guests.filter(g=>g.rsvp==="Yes").length;
    const shopLeft = trip.shopping.filter(x=>!x.gotIt).length;
    const budgetTotal = trip.budget.reduce((s,e)=>s+(Number(e.amount)||0),0);
    const checkLeft = trip.checklist.filter(c=>!c.done).length;

    // today's / first day schedule
    const t = todayISO();
    let focusDay = days.indexOf(t) >= 0 ? t : days[0];
    const daySched = trip.schedule.filter(s=>s.day===focusDay).sort((a,b)=>(a.time||"").localeCompare(b.time||""));
    // first weather day
    const wx = (trip.weather||[]).find(w=>w.date===focusDay) || (trip.weather||[])[0];

    let html = '<div class="page-head"><div><h2>'+esc(trip.name)+'</h2>' +
      '<p>'+(trip.location?'<span class="label" style="text-transform:none;letter-spacing:0;font-size:.95rem">'+esc(trip.location)+(trip.site?' · '+esc(trip.site):"")+'</span>':"Add a location in trip details") + '</p></div>' +
      '<div style="text-align:right"><div class="label">'+esc(fmtRange(trip.startDate, trip.endDate)||"No dates set")+'</div>' +
      '<div style="margin-top:6px"><span class="pill '+pillClass+'"><span class="dot"></span>'+esc(String(du!==null&&du>0?du+" days out":countTitle))+'</span></div></div></div>';

    // hero stats
    html += '<div class="grid cols-4 section-block">' +
      statTile(countTitle, '<span class="num">'+countVal+'</span>', countSub, "ember") +
      statTile("Packing", '<span class="num">'+packPct+'%</span>', packedDone+" of "+packedTotal+" packed", "accent", packPct) +
      statTile("Meals planned", '<span class="num">'+mealsPlanned+'</span>', "on the menu") +
      statTile("Going", '<span class="num">'+guestsYes+'</span>', "confirmed of "+trip.people.length) +
    '</div>';

    html += '<div class="grid cols-2">';

    // schedule card
    html += '<div class="card card-pad"><div class="section-title"><div><h3>'+(focusDay===t?"Today":fmtDate(focusDay,"dow")+"’s plan")+'</h3>' +
      '<div class="label">'+esc(fmtDate(focusDay,"long")||"Schedule")+'</div></div>' +
      '<button class="btn sm" data-action="nav" data-section="schedule">Full schedule</button></div>';
    if (daySched.length) {
      html += '<div class="timeline">' + daySched.slice(0,6).map(s =>
        '<div class="tl-item"><span class="tl-time num">'+esc(s.time||"—")+'</span><div><div class="row-title">'+esc(s.activity)+'</div>'+(s.notes?'<div class="row-sub">'+esc(s.notes)+'</div>':"")+'</div></div>').join("") + '</div>';
    } else html += '<p style="color:var(--muted);margin:8px 0 0">Nothing scheduled for this day yet.</p>';
    html += '</div>';

    // weather + quick facts card
    html += '<div style="display:flex;flex-direction:column;gap:16px">';
    html += '<div class="card card-pad"><div class="section-title"><h3>Weather</h3><button class="btn sm" data-action="nav" data-section="weather">All days</button></div>';
    if (wx) {
      html += '<div style="display:flex;align-items:baseline;gap:10px;margin-top:6px">' +
        '<span class="wx-hi" style="font-family:var(--font-display);font-size:2.2rem">'+esc(wx.high||"—")+'°</span>' +
        '<span style="color:var(--muted)">/ '+esc(wx.low||"—")+'°</span>' +
        '<span style="margin-left:auto" class="pill info">'+esc(wx.condition||"—")+'</span></div>' +
        '<div class="label" style="margin-top:6px">'+esc(fmtDate(wx.date,"long"))+(wx.precip?' · '+esc(wx.precip)+' precip':"")+'</div>';
    } else {
      html += '<p style="color:var(--muted);margin:8px 0 0">No forecast entered yet. Add it in the Weather tab closer to the trip.</p>';
    }
    html += '</div>';

    // quick facts
    html += '<div class="card card-pad"><h3 style="margin-bottom:12px">At a glance</h3><div class="list" style="gap:0">' +
      glanceRow("Shopping left", shopLeft + " item"+(shopLeft===1?"":"s"), "shopping") +
      glanceRow("Prep checklist", checkLeft + " to do", "notes") +
      glanceRow("Shared budget", money(budgetTotal), "budget") +
      glanceRow("Roles assigned", trip.roles.filter(r=>r.personId).length + " of " + trip.roles.length, "roles") +
      '</div></div>';
    html += '</div>'; // right col
    html += '</div>'; // grid

    return html;
  }
  function statTile(label, val, sub, tone, pct) {
    return '<div class="card stat"><div class="label">'+esc(label)+'</div><div class="val" style="'+(tone==="ember"?"color:var(--ember)":"")+'">'+val+'</div>' +
      (pct!=null?'<div class="progress" style="margin-top:10px"><span style="width:'+pct+'%"></span></div>':'<div class="sub">'+esc(sub)+'</div>') + '</div>';
  }
  function glanceRow(label, val, section) {
    return '<button class="row-item" data-action="nav" data-section="'+section+'" style="width:100%;background:none;border-left:none;border-right:none;border-top:none;text-align:left;cursor:pointer">' +
      '<span class="row-main"><span class="row-title" style="font-weight:400">'+esc(label)+'</span></span>' +
      '<span class="pill muted">'+esc(val)+'</span></button>';
  }

  /* ---------- Weather ---------- */
  function secWeather(trip) {
    const days = tripDays(trip);
    let html = pageHead("Weather", "Manual forecast — enter it closer to the trip (live forecasts reach ~14 days out).", "");
    if (!days.length) return html + emptyState(I.weather, "Set trip dates first to lay out the forecast days.", "edit-trip", "Set dates");
    html += '<div class="card card-pad" style="margin-bottom:18px;display:flex;gap:10px;align-items:center;background:var(--info-soft);border-color:transparent">' +
      '<span class="label" style="color:var(--info)">Tip</span><span style="font-size:.9rem;color:var(--ink)">Around Aug 7, check a forecast for '+esc(trip.location||"your destination")+' and fill in each day. Click a card to edit.</span></div>';
    html += '<div class="wx-grid">';
    days.forEach(d => {
      const w = (trip.weather||[]).find(x => x.date === d) || { date: d };
      const filled = w.high || w.low || w.condition;
      html += '<button class="card wx" data-action="edit-weather" data-id="'+d+'" style="text-align:left;cursor:pointer;color:inherit">' +
        '<div class="label">'+esc(fmtDate(d,"dow"))+' · '+esc(fmtDate(d,"md"))+'</div>' +
        (filled ?
          '<div class="temps"><span class="hi">'+esc(w.high||"—")+'°</span><span class="lo">/ '+esc(w.low||"—")+'°</span></div>' +
          '<div class="cond"><span class="pill info">'+esc(w.condition||"—")+'</span></div>' +
          (w.precip?'<div class="row-sub" style="margin-top:8px">Precip: '+esc(w.precip)+'</div>':"") +
          (w.notes?'<div class="row-sub">'+esc(w.notes)+'</div>':"")
          : '<div class="temps"><span class="hi" style="color:var(--muted)">—</span></div><div class="cond" style="color:var(--muted);font-size:.85rem">Tap to add forecast</div>') +
        '</button>';
    });
    html += '</div>';
    return html;
  }

  /* ---------- Meals ---------- */
  const MEAL_ORDER = { "Breakfast":0, "Lunch":1, "Dinner":2, "Snack":3, "Drinks":4 };
  function secMeals(trip) {
    let html = pageHead("Meals & Menu", "What you're eating, and who's cooking.", addBtn("add-meal","Add meal"));
    const days = tripDays(trip);
    if (!trip.meals.length) return html + emptyState(I.meals, "No meals planned yet. Build out the menu day by day.", "add-meal", "Add first meal");
    const groups = days.length ? days.slice() : [];
    trip.meals.forEach(m => { if (groups.indexOf(m.day) < 0) groups.push(m.day || ""); });
    groups.forEach(day => {
      const meals = trip.meals.filter(m => (m.day||"") === (day||"")).sort((a,b)=>(MEAL_ORDER[a.type]??9)-(MEAL_ORDER[b.type]??9));
      if (!meals.length) return;
      html += '<div class="day-head"><h4>'+esc(day?fmtDate(day,"long"):"Unscheduled")+'</h4></div>';
      html += '<div class="card"><div class="list card-pad" style="padding-top:4px;padding-bottom:4px">';
      meals.forEach(m => {
        html += '<div class="row-item">' +
          '<span class="pill green" style="min-width:74px;justify-content:center">'+esc(m.type||"Meal")+'</span>' +
          '<div class="row-main"><div class="row-title">'+esc(m.name||"(unnamed)")+'</div>' +
          (m.notes?'<div class="row-sub">'+esc(m.notes)+'</div>':"") + '</div>' +
          (m.personId?'<span class="pill muted" style="gap:6px">'+personBadge(trip,m.personId)+'<span style="font-family:var(--font-body);font-weight:500">'+esc(personName(trip,m.personId))+'</span></span>':'<span class="pill muted">cook: TBD</span>') +
          rowActions("edit-meal","del-meal",m.id) + '</div>';
      });
      html += '</div></div>';
    });
    return html;
  }
  function mealFields(trip) {
    const days = tripDays(trip);
    return [
      { key:"day", label:"Day", type:"select", options: () => (days.length?days:[""]).map(d => ({value:d, label: d?fmtDate(d,"long"):"Unscheduled"})) },
      { key:"type", label:"Meal", type:"select", options:["Breakfast","Lunch","Dinner","Snack","Drinks"] },
      { key:"name", label:"Dish / menu", type:"text", required:true, placeholder:"e.g. Steak BBQ" },
      { key:"personId", label:"Who's cooking", type:"person" },
      { key:"notes", label:"Notes", type:"textarea", placeholder:"Ingredients, prep, dietary notes…" },
    ];
  }

  /* ---------- Shopping ---------- */
  function secShopping(trip) {
    const left = trip.shopping.filter(x=>!x.gotIt).length;
    let html = pageHead("Shopping List", left+" item"+(left===1?"":"s")+" still to buy.",
      '<button class="btn" data-action="clear-got">Clear checked</button>' + addBtn("add-shop","Add item"));
    if (!trip.shopping.length) return html + emptyState(I.shopping, "Nothing on the list yet. Add supplies and groceries.", "add-shop", "Add first item");
    const cats = {};
    trip.shopping.forEach(s => { const c = s.category||"Other"; (cats[c]=cats[c]||[]).push(s); });
    Object.keys(cats).forEach(cat => {
      const items = cats[cat];
      html += '<div class="day-head"><h4>'+esc(cat)+'</h4><span class="label">'+items.filter(i=>i.gotIt).length+'/'+items.length+'</span></div>';
      html += '<div class="card"><div class="list card-pad" style="padding-top:4px;padding-bottom:4px">';
      items.forEach(s => {
        html += '<div class="row-item'+(s.gotIt?" done":"")+'">' +
          '<input type="checkbox" class="check" '+(s.gotIt?"checked":"")+' data-action="toggle-shop" data-id="'+s.id+'">' +
          '<div class="row-main"><div class="row-title">'+esc(s.item)+(s.qty?' <span class="label" style="text-transform:none;letter-spacing:0">· '+esc(s.qty)+'</span>':"")+'</div>' +
          (s.forMeal?'<div class="row-sub">for '+esc(s.forMeal)+'</div>':"") + '</div>' +
          rowActions("edit-shop","del-shop",s.id) + '</div>';
      });
      html += '</div></div>';
    });
    return html;
  }
  function shopFields(trip) {
    const cats = ["Food & Drink","Camp Supplies","Personal","Cooking Gear","Other"];
    return [
      { key:"item", label:"Item", type:"text", required:true, placeholder:"e.g. Charcoal" },
      { key:"qty", label:"Quantity", type:"text", placeholder:"e.g. 2 bags", row:true },
      { key:"category", label:"Category", type:"select", options: cats },
      { key:"forMeal", label:"For meal (optional)", type:"text", placeholder:"Link to a menu item" },
    ];
  }

  /* ---------- Roles ---------- */
  function secRoles(trip) {
    let html = pageHead("Roles & Responsibilities", "Who's got what covered.", addBtn("add-role","Add role"));
    if (!trip.people.length) html += noPeopleNote();
    if (!trip.roles.length) return html + emptyState(I.roles, "No roles yet. Assign responsibilities so nothing slips.", "add-role", "Add first role");
    html += '<div class="grid cols-2">';
    trip.roles.forEach(r => {
      html += '<div class="card card-pad" style="display:flex;align-items:flex-start;gap:14px">' +
        personBadge(trip, r.personId) +
        '<div style="flex:1;min-width:0"><div class="row-title">'+esc(r.title)+'</div>' +
        '<div class="row-sub">'+(r.personId?esc(personName(trip,r.personId)):"Unassigned")+(r.notes?' · '+esc(r.notes):"")+'</div></div>' +
        rowActions("edit-role","del-role",r.id) + '</div>';
    });
    html += '</div>';
    return html;
  }
  function roleFields() {
    return [
      { key:"title", label:"Responsibility", type:"text", required:true, placeholder:"e.g. Fire Keeper" },
      { key:"personId", label:"Assigned to", type:"person" },
      { key:"notes", label:"Notes", type:"text", placeholder:"Optional detail" },
    ];
  }

  /* ---------- Schedule ---------- */
  function secSchedule(trip) {
    let html = pageHead("Daily Schedule", "The plan, hour by hour.", addBtn("add-sched","Add item"));
    const days = tripDays(trip);
    if (!trip.schedule.length) return html + emptyState(I.schedule, "No schedule yet. Lay out arrival, activities and departure.", "add-sched", "Add first item");
    const groups = days.length ? days.slice() : [];
    trip.schedule.forEach(s => { if (groups.indexOf(s.day) < 0) groups.push(s.day||""); });
    groups.forEach(day => {
      const items = trip.schedule.filter(s => (s.day||"")===(day||"")).sort((a,b)=>(a.time||"").localeCompare(b.time||""));
      if (!items.length) return;
      html += '<div class="day-head"><h4>'+esc(day?fmtDate(day,"long"):"Unscheduled")+'</h4></div>';
      html += '<div class="card card-pad"><div class="timeline">';
      items.forEach(s => {
        html += '<div class="tl-item"><span class="tl-time num">'+esc(s.time||"—")+'</span>' +
          '<div style="flex:1"><div class="row-title">'+esc(s.activity)+'</div>'+(s.notes?'<div class="row-sub">'+esc(s.notes)+'</div>':"")+'</div>' +
          rowActions("edit-sched","del-sched",s.id) + '</div>';
      });
      html += '</div></div>';
    });
    return html;
  }
  function schedFields(trip) {
    const days = tripDays(trip);
    return [
      { key:"day", label:"Day", type:"select", options: () => (days.length?days:[""]).map(d => ({value:d, label: d?fmtDate(d,"long"):"Unscheduled"})) },
      { key:"time", label:"Time", type:"time", row:true },
      { key:"activity", label:"Activity", type:"text", required:true, placeholder:"e.g. Hike to Mazinaw Rock" },
      { key:"notes", label:"Notes", type:"text", placeholder:"Optional detail" },
    ];
  }

  /* ---------- Packing ---------- */
  function secPacking(trip) {
    const total = trip.packing.length, done = trip.packing.filter(x=>x.packed).length;
    const pct = total ? Math.round(done/total*100) : 0;
    let html = pageHead("Packing List", done+" of "+total+" packed.", addBtn("add-pack","Add item"));
    if (!trip.packing.length) return html + emptyState(I.packing, "Empty list. Add what needs to come along.", "add-pack", "Add first item");
    html += '<div class="card card-pad section-block"><div style="display:flex;justify-content:space-between;margin-bottom:8px"><span class="label">Overall progress</span><span class="num" style="font-weight:600">'+pct+'%</span></div><div class="progress"><span style="width:'+pct+'%"></span></div></div>';
    const cats = {};
    trip.packing.forEach(p => { const c = p.category||"Other"; (cats[c]=cats[c]||[]).push(p); });
    Object.keys(cats).forEach(cat => {
      const items = cats[cat];
      html += '<div class="day-head"><h4>'+esc(cat)+'</h4><span class="label">'+items.filter(i=>i.packed).length+'/'+items.length+'</span></div>';
      html += '<div class="card"><div class="list card-pad" style="padding-top:4px;padding-bottom:4px">';
      items.forEach(p => {
        html += '<div class="row-item'+(p.packed?" done":"")+'">' +
          '<input type="checkbox" class="check" '+(p.packed?"checked":"")+' data-action="toggle-pack" data-id="'+p.id+'">' +
          '<div class="row-main"><div class="row-title">'+esc(p.item)+'</div>' +
          (p.personId?'<div class="row-sub">'+esc(personName(trip,p.personId))+' is bringing it</div>':"") + '</div>' +
          rowActions("edit-pack","del-pack",p.id) + '</div>';
      });
      html += '</div></div>';
    });
    return html;
  }
  function packFields() {
    const cats = ["Shelter & Sleep","Kitchen & Cooking","Clothing","Personal & Health","Tools & Extras","Fun","Other"];
    return [
      { key:"item", label:"Item", type:"text", required:true, placeholder:"e.g. Sleeping bag" },
      { key:"category", label:"Category", type:"select", options: cats },
      { key:"personId", label:"Who's bringing it", type:"person" },
    ];
  }

  /* ---------- Guests & Carpool ---------- */
  function secGuests(trip) {
    let html = pageHead("Guests & Carpool", "Who's coming, and who's driving with whom.",
      '<button class="btn" data-action="add-person">'+I.plus+' Add person</button>');
    if (!trip.people.length) return html + emptyState(I.guests, "No one added yet. Add the crew.", "add-person", "Add person");
    // ensure a guest record per person
    const rsvpTone = { "Yes":"green", "No":"danger", "Maybe":"warn", "":"muted" };
    html += '<div class="card"><div class="list card-pad" style="padding-top:4px;padding-bottom:4px">';
    trip.people.forEach(p => {
      const g = trip.guests.find(x => x.personId === p.id) || { personId: p.id, rsvp:"", arrival:"", contact:"", carpool:"", driver:false };
      html += '<div class="row-item">' + '<span class="avatar">'+initials(p.name)+'</span>' +
        '<div class="row-main"><div class="row-title">'+esc(p.name)+(g.driver?' <span class="pill info" style="margin-left:6px">Driver</span>':"")+'</div>' +
        '<div class="row-sub">' + (g.arrival?'Arrives '+esc(g.arrival):"") + (g.carpool?(g.arrival?' · ':'')+'Carpool: '+esc(g.carpool):"") + (g.contact?(g.arrival||g.carpool?' · ':'')+esc(g.contact):"") + (!(g.arrival||g.carpool||g.contact)?'No details yet':"") + '</div></div>' +
        '<span class="pill '+(rsvpTone[g.rsvp]||"muted")+'">'+esc(g.rsvp||"No reply")+'</span>' +
        '<div class="row-actions"><button class="icon-btn" data-action="edit-guest" data-id="'+p.id+'" title="Edit">'+I.edit+'</button>' +
        '<button class="icon-btn" data-action="del-person" data-id="'+p.id+'" title="Remove person">'+I.trash+'</button></div>' + '</div>';
    });
    html += '</div></div>';
    // carpool groupings
    const groups = {};
    trip.people.forEach(p => { const g = trip.guests.find(x=>x.personId===p.id); const key = (g&&g.carpool)?g.carpool:null; if (key) (groups[key]=groups[key]||[]).push({p,g}); });
    if (Object.keys(groups).length) {
      html += '<div class="day-head"><h4>Carpool groups</h4></div><div class="grid cols-2">';
      Object.keys(groups).forEach(k => {
        html += '<div class="card card-pad"><div class="label" style="margin-bottom:8px">'+esc(k)+'</div>' +
          groups[k].map(({p,g}) => '<div style="display:flex;align-items:center;gap:9px;padding:4px 0"><span class="avatar">'+initials(p.name)+'</span><span>'+esc(p.name)+'</span>'+(g.driver?'<span class="pill info" style="margin-left:auto">Driving</span>':"")+'</div>').join("") +
          '</div>';
      });
      html += '</div>';
    }
    return html;
  }
  function guestFields() {
    return [
      { key:"rsvp", label:"RSVP", type:"select", options:["Yes","Maybe","No",""].map(v=>({value:v,label:v||"No reply"})) },
      { key:"arrival", label:"Arrival", type:"text", placeholder:"e.g. Fri afternoon", row:true },
      { key:"carpool", label:"Carpool group", type:"text", placeholder:"e.g. Eric's car" },
      { key:"contact", label:"Contact", type:"text", placeholder:"Phone / email (optional)" },
      { key:"driver", label:"Driver", type:"checkbox", checkLabel:"This person is driving" },
    ];
  }

  /* ---------- Budget ---------- */
  function secBudget(trip) {
    const total = trip.budget.reduce((s,e)=>s+(Number(e.amount)||0),0);
    let html = pageHead("Budget & Split", "Shared expenses, split automatically.", addBtn("add-expense","Add expense"));
    if (!trip.people.length) html += noPeopleNote();
    // summary tiles
    const perHead = trip.people.length ? total/trip.people.length : 0;
    html += '<div class="grid cols-3 section-block">' +
      statTile("Total spent", '<span class="num">'+money(total)+'</span>', trip.budget.length+" expense"+(trip.budget.length===1?"":"s")) +
      statTile("Per person", '<span class="num">'+money(perHead)+'</span>', "even split of all shared costs") +
      statTile("Expenses", '<span class="num">'+trip.budget.length+'</span>', "logged") +
    '</div>';

    // settle up
    const settle = computeSettle(trip);
    html += '<div class="section-block"><div class="section-title"><h3>Settle up</h3><span class="label">Fewest transfers</span></div><div class="card card-pad">';
    if (!trip.budget.length) html += '<p style="color:var(--muted);margin:0">Add expenses to see who owes whom.</p>';
    else if (!settle.length) html += '<p style="color:var(--accent-ink);margin:0">All square — everyone\'s even. 🎒</p>'.replace("🎒","");
    else html += settle.map(s => '<div class="settle"><span class="avatar">'+initials(s.fromName)+'</span><span>'+esc(s.fromName)+'</span>' +
      '<span class="arrow">→ pays →</span><span class="avatar">'+initials(s.toName)+'</span><span>'+esc(s.toName)+'</span>' +
      '<span class="amt">'+money(s.amount)+'</span></div>').join("");
    html += '</div></div>';

    // expense list
    html += '<div class="section-title"><h3>Expenses</h3></div>';
    if (!trip.budget.length) return html + emptyState(I.budget, "No expenses logged yet.", "add-expense", "Add first expense");
    html += '<div class="card"><div class="list card-pad" style="padding-top:4px;padding-bottom:4px">';
    trip.budget.forEach(e => {
      const among = (e.splitAmong && e.splitAmong.length) ? e.splitAmong : trip.people.map(p=>p.id);
      html += '<div class="row-item"><div class="row-main"><div class="row-title">'+esc(e.description||"Expense")+'</div>' +
        '<div class="row-sub">Paid by '+esc(personName(trip,e.paidBy)||"?")+' · split '+among.length+' way'+(among.length===1?"":"s")+(e.date?' · '+esc(fmtDate(e.date,"md")):"")+'</div></div>' +
        '<span class="pill muted num" style="font-family:var(--font-mono)">'+money(e.amount)+'</span>' +
        rowActions("edit-expense","del-expense",e.id) + '</div>';
    });
    html += '</div></div>';
    return html;
  }
  function expenseFields(trip) {
    return [
      { key:"description", label:"What was it?", type:"text", required:true, placeholder:"e.g. Groceries" },
      { key:"amount", label:"Amount ($)", type:"number", required:true, placeholder:"0.00", row:true },
      { key:"paidBy", label:"Paid by", type:"person" },
      { key:"date", label:"Date", type:"date" },
      { key:"splitAmong", label:"Split among", type:"multiperson", hint:"Everyone selected splits this evenly." },
    ];
  }
  function computeSettle(trip) {
    const bal = {}; trip.people.forEach(p => bal[p.id] = 0);
    trip.budget.forEach(e => {
      const amt = Number(e.amount)||0; if (!amt) return;
      const among = (e.splitAmong && e.splitAmong.length) ? e.splitAmong.filter(id=>bal[id]!=null) : trip.people.map(p=>p.id);
      if (!among.length) return;
      const share = amt / among.length;
      if (bal[e.paidBy] != null) bal[e.paidBy] += amt;
      among.forEach(id => { bal[id] -= share; });
    });
    const debtors = [], creditors = [];
    Object.keys(bal).forEach(id => { const v = Math.round(bal[id]*100)/100; if (v < -0.01) debtors.push({id, amt:-v}); else if (v > 0.01) creditors.push({id, amt:v}); });
    debtors.sort((a,b)=>b.amt-a.amt); creditors.sort((a,b)=>b.amt-a.amt);
    const out = []; let i=0, j=0;
    while (i < debtors.length && j < creditors.length) {
      const pay = Math.min(debtors[i].amt, creditors[j].amt);
      out.push({ fromName: personName(trip,debtors[i].id), toName: personName(trip,creditors[j].id), amount: pay });
      debtors[i].amt -= pay; creditors[j].amt -= pay;
      if (debtors[i].amt < 0.01) i++; if (creditors[j].amt < 0.01) j++;
    }
    return out;
  }

  /* ---------- Notes & Checklist ---------- */
  function secNotes(trip) {
    const left = trip.checklist.filter(c=>!c.done).length;
    let html = pageHead("Notes & Checklist", "Free notes plus a pre-departure checklist.", "");
    html += '<div class="grid cols-2" style="align-items:start">';
    // checklist
    html += '<div><div class="section-title"><h3>Pre-departure checklist</h3><span class="label">'+left+' left</span></div>' +
      '<div class="card"><div class="list card-pad" style="padding-top:4px;padding-bottom:4px" id="checklist">';
    trip.checklist.forEach(c => {
      html += '<div class="row-item'+(c.done?" done":"")+'">' +
        '<input type="checkbox" class="check" '+(c.done?"checked":"")+' data-action="toggle-check" data-id="'+c.id+'">' +
        '<div class="row-main"><div class="row-title">'+esc(c.text)+'</div></div>' +
        '<button class="icon-btn" data-action="del-check" data-id="'+c.id+'">'+I.trash+'</button></div>';
    });
    html += '</div><div class="card-pad" style="border-top:1px solid var(--border);display:flex;gap:8px">' +
      '<input type="text" id="newCheck" placeholder="Add a checklist item…" style="flex:1;padding:8px 11px;border:1px solid var(--border-strong);border-radius:8px;background:var(--surface-2);color:var(--ink)">' +
      '<button class="btn primary" data-action="add-check">'+I.plus+'</button></div></div></div>';
    // notes
    html += '<div><div class="section-title"><h3>Notes</h3><span class="label">Auto-saved</span></div>' +
      '<div class="card card-pad"><textarea id="tripNotes" placeholder="Reservation numbers, directions, reminders, anything…" ' +
      'style="width:100%;min-height:320px;border:none;background:transparent;color:var(--ink);resize:vertical;font-family:var(--font-body);font-size:.95rem;line-height:1.6">'+esc(trip.notes||"")+'</textarea></div></div>';
    html += '</div>';
    return html;
  }
  function wireNotes(trip) {
    const ta = document.getElementById("tripNotes");
    if (ta) { let t; ta.addEventListener("input", () => { trip.notes = ta.value; clearTimeout(t); t = setTimeout(save, 400); }); }
    const nc = document.getElementById("newCheck");
    if (nc) nc.addEventListener("keydown", e => { if (e.key === "Enter") { e.preventDefault(); addCheck(nc.value); } });
  }
  function addCheck(v) {
    v = (v||"").trim(); if (!v) return;
    activeTrip().checklist.push({ id: uid(), text: v, done: false }); save(); renderSidebar; render();
  }

  function noPeopleNote() {
    return '<div class="card card-pad" style="margin-bottom:18px;background:var(--warn-soft);border-color:transparent;display:flex;gap:10px;align-items:center">' +
      '<span class="label" style="color:var(--warn)">Heads up</span><span style="font-size:.9rem">Add people in the <b>Guests</b> tab so you can assign them here.</span></div>';
  }

  /* =========================================================
     ACTIONS
  ========================================================= */
  function findById(arr, id) { return arr.find(x => x.id === id); }

  const ACTIONS = {
    nav: (el) => { ui.section = el.dataset.section; render(); document.getElementById("content").scrollTop = 0; window.scrollTo(0,0); },
    theme: () => cycleTheme(),
    "switch-trip": (el) => { state.activeId = el.value; save(); ui.section = "overview"; render(); },
    "new-trip": () => newTrip(),
    "edit-trip": () => editTrip(),
    export: () => doExport(),
    import: () => doImport(),

    // weather
    "edit-weather": (el) => editWeather(el.dataset.id),

    // meals
    "add-meal": () => { const t = activeTrip(); openForm({ title:"Add meal", fields: mealFields(t), values:{ type:"Dinner", day:(tripDays(t)[0]||"") }, onSubmit: v => { t.meals.push(Object.assign({id:uid()}, v)); save(); render(); toast("Meal added"); } }); },
    "edit-meal": (el) => { const t = activeTrip(); const m = findById(t.meals, el.dataset.id); openForm({ title:"Edit meal", fields: mealFields(t), values:m, onSubmit: v => { Object.assign(m, v); save(); render(); toast("Saved"); } }); },
    "del-meal": (el) => delItem("meals", el.dataset.id, "Delete this meal?"),

    // shopping
    "add-shop": () => { const t = activeTrip(); openForm({ title:"Add item", fields: shopFields(t), values:{category:"Food & Drink"}, onSubmit: v => { t.shopping.push(Object.assign({id:uid(), gotIt:false}, v)); save(); render(); toast("Added to list"); } }); },
    "edit-shop": (el) => { const t = activeTrip(); const s = findById(t.shopping, el.dataset.id); openForm({ title:"Edit item", fields: shopFields(t), values:s, onSubmit: v => { Object.assign(s, v); save(); render(); } }); },
    "del-shop": (el) => delItem("shopping", el.dataset.id, "Remove this item?"),
    "toggle-shop": (el) => { const s = findById(activeTrip().shopping, el.dataset.id); s.gotIt = el.checked; save(); render(); },
    "clear-got": () => { const t = activeTrip(); const n = t.shopping.filter(x=>x.gotIt).length; if(!n){toast("Nothing checked");return;} confirmDialog("Clear checked items", "Remove "+n+" checked item"+(n===1?"":"s")+" from the list?", () => { t.shopping = t.shopping.filter(x=>!x.gotIt); save(); render(); toast("Cleared"); }, "Clear"); },

    // roles
    "add-role": () => { const t = activeTrip(); openForm({ title:"Add role", fields: roleFields(), onSubmit: v => { t.roles.push(Object.assign({id:uid()}, v)); save(); render(); toast("Role added"); } }); },
    "edit-role": (el) => { const t = activeTrip(); const r = findById(t.roles, el.dataset.id); openForm({ title:"Edit role", fields: roleFields(), values:r, onSubmit: v => { Object.assign(r, v); save(); render(); } }); },
    "del-role": (el) => delItem("roles", el.dataset.id, "Delete this role?"),

    // schedule
    "add-sched": () => { const t = activeTrip(); openForm({ title:"Add schedule item", fields: schedFields(t), values:{ day:(tripDays(t)[0]||"") }, onSubmit: v => { t.schedule.push(Object.assign({id:uid()}, v)); save(); render(); toast("Added"); } }); },
    "edit-sched": (el) => { const t = activeTrip(); const s = findById(t.schedule, el.dataset.id); openForm({ title:"Edit schedule item", fields: schedFields(t), values:s, onSubmit: v => { Object.assign(s, v); save(); render(); } }); },
    "del-sched": (el) => delItem("schedule", el.dataset.id, "Delete this item?"),

    // packing
    "add-pack": () => { const t = activeTrip(); openForm({ title:"Add packing item", fields: packFields(), values:{category:"Shelter & Sleep"}, onSubmit: v => { t.packing.push(Object.assign({id:uid(), packed:false}, v)); save(); render(); toast("Added"); } }); },
    "edit-pack": (el) => { const t = activeTrip(); const p = findById(t.packing, el.dataset.id); openForm({ title:"Edit packing item", fields: packFields(), values:p, onSubmit: v => { Object.assign(p, v); save(); render(); } }); },
    "del-pack": (el) => delItem("packing", el.dataset.id, "Remove this item?"),
    "toggle-pack": (el) => { const p = findById(activeTrip().packing, el.dataset.id); p.packed = el.checked; save(); render(); },

    // guests / people
    "add-person": () => { openForm({ title:"Add person", fields:[{key:"name",label:"Name",type:"text",required:true,placeholder:"First name"}], onSubmit: v => { const t = activeTrip(); const pid = uid(); t.people.push({id:pid, name:v.name}); t.guests.push({id:uid(), personId:pid, rsvp:"Yes", arrival:"", contact:"", carpool:"", driver:false}); save(); render(); toast(v.name+" added"); } }); },
    "edit-guest": (el) => { const t = activeTrip(); const pid = el.dataset.id; const person = findById(t.people, pid); let g = t.guests.find(x=>x.personId===pid); if(!g){ g = {id:uid(), personId:pid, rsvp:"", arrival:"", contact:"", carpool:"", driver:false}; t.guests.push(g); }
      openForm({ title:"Edit "+person.name, fields:[{key:"name",label:"Name",type:"text",required:true}].concat(guestFields()), values:Object.assign({name:person.name}, g), onSubmit: v => { person.name = v.name; g.rsvp=v.rsvp; g.arrival=v.arrival; g.carpool=v.carpool; g.contact=v.contact; g.driver=v.driver; save(); render(); toast("Saved"); } }); },
    "del-person": (el) => { const t = activeTrip(); const pid = el.dataset.id; const person = findById(t.people, pid); confirmDialog("Remove "+person.name+"?", "This removes them from the crew and unassigns them from roles, meals and packing.", () => {
        t.people = t.people.filter(p=>p.id!==pid); t.guests = t.guests.filter(g=>g.personId!==pid);
        t.roles.forEach(r=>{ if(r.personId===pid) r.personId=""; }); t.meals.forEach(m=>{ if(m.personId===pid) m.personId=""; }); t.packing.forEach(p=>{ if(p.personId===pid) p.personId=""; });
        t.budget.forEach(e=>{ if(e.paidBy===pid) e.paidBy=""; if(e.splitAmong) e.splitAmong=e.splitAmong.filter(x=>x!==pid); });
        save(); render(); toast("Removed"); }, "Remove"); },

    // budget
    "add-expense": () => { const t = activeTrip(); if(!t.people.length){toast("Add people first");return;} openForm({ title:"Add expense", fields: expenseFields(t), values:{ paidBy:(t.people[0]||{}).id, splitAmong:t.people.map(p=>p.id) }, onSubmit: v => { t.budget.push({id:uid(), description:v.description, amount:Number(v.amount)||0, paidBy:v.paidBy, date:v.date, splitAmong:v.splitAmong}); save(); render(); toast("Expense added"); } }); },
    "edit-expense": (el) => { const t = activeTrip(); const e = findById(t.budget, el.dataset.id); openForm({ title:"Edit expense", fields: expenseFields(t), values:e, onSubmit: v => { Object.assign(e, {description:v.description, amount:Number(v.amount)||0, paidBy:v.paidBy, date:v.date, splitAmong:v.splitAmong}); save(); render(); } }); },
    "del-expense": (el) => delItem("budget", el.dataset.id, "Delete this expense?"),

    // checklist
    "toggle-check": (el) => { const c = findById(activeTrip().checklist, el.dataset.id); c.done = el.checked; save(); render(); },
    "del-check": (el) => { const t = activeTrip(); t.checklist = t.checklist.filter(c=>c.id!==el.dataset.id); save(); render(); },
    "add-check": () => { const nc = document.getElementById("newCheck"); if(nc) addCheck(nc.value); },
  };

  function delItem(collection, id, msg) {
    confirmDialog("Confirm delete", msg, () => { const t = activeTrip(); t[collection] = t[collection].filter(x=>x.id!==id); save(); render(); toast("Deleted"); });
  }

  function editWeather(date) {
    const t = activeTrip();
    let w = (t.weather||[]).find(x=>x.date===date);
    const isNew = !w; if (isNew) w = { date };
    openForm({ title: "Weather — "+fmtDate(date,"long"),
      fields: [
        { key:"high", label:"High (°C)", type:"number", placeholder:"e.g. 24", row:true },
        { key:"low", label:"Low (°C)", type:"number", placeholder:"e.g. 13" },
        { key:"condition", label:"Conditions", type:"select", options:["Sunny","Partly cloudy","Cloudy","Light rain","Rain","Thunderstorms","Windy","Fog"] },
        { key:"precip", label:"Precipitation", type:"text", placeholder:"e.g. 20% / 5mm", row:true },
        { key:"notes", label:"Notes", type:"text", placeholder:"Optional" },
      ], values: w,
      onSubmit: v => { Object.assign(w, v); if (isNew) t.weather.push(w); save(); render(); toast("Forecast saved"); } });
  }

  /* ---------- Trip management ---------- */
  const tripFields = [
    { key:"name", label:"Trip name", type:"text", required:true, placeholder:"e.g. Cottage Weekend" },
    { key:"location", label:"Location", type:"text", placeholder:"Park / town / region" },
    { key:"site", label:"Site / address detail", type:"text", placeholder:"e.g. Campground — Site 12" },
    { key:"startDate", label:"Start date", type:"date", row:true },
    { key:"endDate", label:"End date", type:"date" },
  ];
  function newTrip() {
    openForm({ title:"New trip", submitLabel:"Create trip", fields: tripFields, values:{}, onSubmit: v => {
      const t = blankTrip(v.name); t.location=v.location; t.site=v.site; t.startDate=v.startDate; t.endDate=v.endDate;
      state.trips.push(t); state.activeId = t.id; ui.section = "overview"; save(); render();
      toast("Trip created — add your crew in Guests");
    }});
  }
  function editTrip() {
    const t = activeTrip();
    const fields = tripFields.concat([]);
    openForm({ title:"Trip details", fields: fields, values: t, onSubmit: v => {
      Object.assign(t, { name:v.name, location:v.location, site:v.site, startDate:v.startDate, endDate:v.endDate });
      save(); render(); toast("Trip updated");
    }, extraFooter: true });
    // add a delete-trip control into the modal footer
    if (state.trips.length > 1) {
      const foot = document.querySelector("#overlay .modal-foot");
      if (foot) { const b = document.createElement("button"); b.type="button"; b.className="btn danger"; b.style.marginRight="auto";
        b.textContent = "Delete trip"; b.addEventListener("click", () => { closeModal(); confirmDialog("Delete "+t.name+"?", "This permanently removes the trip and all its data from this device.", () => { state.trips = state.trips.filter(x=>x.id!==t.id); state.activeId = state.trips[0].id; ui.section="overview"; save(); render(); toast("Trip deleted"); }); });
        foot.insertBefore(b, foot.firstChild); }
    }
  }

  /* ---------- Export / Import ---------- */
  async function doExport() {
    const data = JSON.stringify(state, null, 2);
    const fname = "basecamp-trips-" + todayISO() + ".json";
    if (window.claude && window.claude.downloads && typeof window.claude.downloads.save === "function") {
      try { await window.claude.downloads.save({ filename: fname, data }); toast("Backup saved"); return; }
      catch (e) { if (e && e.code === "user_rejected") { toast("Export cancelled"); return; } /* fall through */ }
    }
    // fallback: data-uri download
    try {
      const a = document.createElement("a");
      a.href = "data:application/json;charset=utf-8," + encodeURIComponent(data);
      a.download = fname; document.body.appendChild(a); a.click(); a.remove();
      toast("Backup downloaded");
    } catch (e) { toast("Export not available here"); }
  }
  function doImport() {
    const inp = document.createElement("input"); inp.type = "file"; inp.accept = "application/json,.json";
    inp.addEventListener("change", () => {
      const file = inp.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const data = JSON.parse(reader.result);
          if (!data || !Array.isArray(data.trips)) throw new Error("bad");
          confirmDialog("Import backup", "This replaces all "+state.trips.length+" trip"+(state.trips.length===1?"":"s")+" currently on this device with "+data.trips.length+" from the file. Export first if you want to keep the current data.", () => {
            state = data; if (!state.activeId || !state.trips.find(t=>t.id===state.activeId)) state.activeId = state.trips[0].id;
            state.trips.forEach(t => { ["weather","meals","shopping","roles","schedule","packing","guests","budget","checklist","people"].forEach(k=>{ if(!Array.isArray(t[k])) t[k]=[]; }); if(typeof t.notes!=="string") t.notes=""; });
            ui.section = "overview"; applyTheme(); save(); render(); toast("Imported "+data.trips.length+" trip"+(data.trips.length===1?"":"s"));
          }, "Replace & import");
        } catch (e) { toast("Couldn't read that file — is it a Basecamp backup?"); }
      };
      reader.readAsText(file);
    });
    inp.click();
  }

  /* ---------- Global event handling ---------- */
  document.addEventListener("click", e => {
    const closeBtn = e.target.closest("[data-close]");
    if (closeBtn) { closeModal(); return; }
    if (e.target.id === "overlay") { closeModal(); return; }
    const actEl = e.target.closest("[data-action]");
    if (!actEl) return;
    // checkboxes handled on change, not click
    if (actEl.matches('input[type="checkbox"]')) return;
    const fn = ACTIONS[actEl.dataset.action];
    if (fn) { e.preventDefault(); fn(actEl); }
  });
  document.addEventListener("change", e => {
    const actEl = e.target.closest("[data-action]");
    if (!actEl) return;
    if (actEl.tagName === "SELECT" && actEl.dataset.action === "switch-trip") { ACTIONS["switch-trip"](actEl); return; }
    if (actEl.matches('input[type="checkbox"]')) { const fn = ACTIONS[actEl.dataset.action]; if (fn) fn(actEl); }
  });
  document.addEventListener("keydown", e => { if (e.key === "Escape" && document.getElementById("overlay").classList.contains("open")) closeModal(); });

  init();
})();
</script>
